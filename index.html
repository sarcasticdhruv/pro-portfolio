<!doctype html>
<html lang="en">
  <head>
    <!-- Sets data-theme before any CSS paints, so the page never flashes
         dark first (index.css's :root block is the dark baseline; light is
         the [data-theme="light"] override). Mirrors useTheme.ts's own logic
         exactly - light by default, dark only if the OS explicitly prefers
         it or the visitor manually chose dark before. -->
    <script>
      (function () {
        try {
          var manual = localStorage.getItem('dhruv_portfolio_theme_manual') === '1';
          var saved = localStorage.getItem('dhruv_portfolio_theme');
          var theme = (manual && (saved === 'dark' || saved === 'light'))
            ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
