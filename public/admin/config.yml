backend:
  name: git-gateway
  branch: main

# Media / image uploads
media_folder: "public/images/blog"
public_folder: "/images/blog"

# Editorial workflow (draft → review → publish)
publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title",       name: "title",       widget: "string" }
      - { label: "Publish Date",name: "date",        widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Excerpt",     name: "excerpt",     widget: "text" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
      - { label: "Cover Image", name: "coverImage",  widget: "image", required: false }
      - { label: "Published",   name: "published",   widget: "boolean", default: false }
      - { label: "Body",        name: "body",        widget: "markdown" }
